apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: job-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 877009927064.dkr.ecr.ap-south-1.amazonaws.com/job-tracker-backend:434ef5c555db2e47ed92c35025319e29a01fe893
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: job-tracker
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
