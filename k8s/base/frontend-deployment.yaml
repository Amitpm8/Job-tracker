apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: job-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 877009927064.dkr.ecr.ap-south-1.amazonaws.com/job-tracker-frontend:7db764341c67fc40c50bb0c1d25b1046d5f78b7e
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: job-tracker
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
